name: Build PlutoForChannels EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Publish Executable
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:ApplicationIcon=icon.ico

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v7
      with:
        name: PlutoForChannels-Windows-x64
        path: bin/Release/net10.0-windows/win-x64/publish/PlutoForChannels.exe
